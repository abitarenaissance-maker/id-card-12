<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EPU Paper ID - 4 per Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --epu-blue: #0d2558; --epu-gold: #d4af37; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; text-align: center; position: sticky; top: 10px; z-index: 100; }
        .selection-section { margin: 15px 0; padding: 10px; border: 2px solid var(--epu-gold); border-radius: 8px; }
        input[type="text"] { width: 85%; padding: 12px; border-radius: 6px; border: 2px solid var(--epu-blue); text-align: center; }
        .btn { width: 100%; padding: 14px; margin: 5px 0; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .btn-sync { background: var(--epu-blue); }
        .btn-all { background: #059669; }
        .btn-custom { background: #d97706; }
        .id-card { width: 500px; height: 350px; background: white; border-radius: 4px; overflow: hidden; position: relative; border: 1px solid #000; display: flex; flex-direction: column; margin-bottom: 20px; }
        .header { height: 70px; background: var(--epu-blue); color: white; display: flex; align-items: center; padding: 0 15px; border-bottom: 3px solid var(--epu-gold); }
        .card-body { flex: 1; display: flex; align-items: center; padding: 15px; position: relative; }
        .watermark-layer { position: absolute; top: 50%; left: 55%; transform: translate(-50%, -50%); width: 250px; opacity: 0.08; filter: grayscale(100%); z-index: 1; }
        .main-photo { width: 130px; height: 160px; border: 2px solid var(--epu-blue); border-radius: 4px; object-fit: cover; z-index: 5; margin-right: 20px; }
        .ghost-photo { position: absolute; bottom: 50px; right: 25px; width: 75px; height: 90px; object-fit: cover; opacity: 0.18; filter: grayscale(100%); z-index: 2; }
        .details { z-index: 10; flex: 1; text-align: left; }
        .student-name { font-size: 22px; font-weight: 900; color: #000; text-transform: uppercase; }
        .id-department { font-family: monospace; font-weight: bold; background:#eee; padding:6px; border-radius:4px; font-size:16px; line-height:1.3; } /* stacked vertically */
        .footer { background: #f8fafc; height: 30px; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: var(--epu-blue); }
    </style>
</head>
<body>

<div class="controls">
    <h2 style="color:var(--epu-blue); margin:0;">EPU Paper ID (4 per A4)</h2>
    <button class="btn btn-sync" onclick="sync()">1. Load Records</button>

    <div class="selection-section">
        <input type="text" id="customIDs" placeholder="IDs (e.g. 001, 006, 010, 012)">
        <button class="btn btn-custom" onclick="generatePDF('custom')">Print Specific IDs</button>
    </div>

    <button class="btn btn-all" onclick="generatePDF('all')">Download All (4 per page)</button>
</div>

<div id="container"></div>

<script>
const SB_URL = 'https://pxyzlrqylkdzqkxfnvwd.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4eXpscnF5bGtkenFreGZudndkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTY3NTgsImV4cCI6MjA4ODg5Mjc1OH0.LKTTxUtsN_CMhsn7bpcbRJ-RNWDM7vaAIATkjBDym_4';
const client = supabase.createClient(SB_URL, SB_KEY);

async function sync() {
    const { data } = await client.from('students').select('*');
    const container = document.getElementById('container');
    container.innerHTML = "";

    // Filter duplicates based on last 5 digits of student_id
    const uniqueStudents = [];
    const seenLast5 = new Set();

    data.forEach(s => {
        const sid = s.student_id ? s.student_id : `00${s.id}`;
        const last5 = sid.slice(-5);
        if (!seenLast5.has(last5)) {
            seenLast5.add(last5);
            uniqueStudents.push(s);
        }
    });

    uniqueStudents.forEach(s => {
        const sid = s.student_id ? s.student_id : `00${s.id}`;
        const department = s.department ? s.department.toUpperCase() : "N/A";
        container.innerHTML += `
            <div class="id-card" data-sid="${sid}">
                <div class="header">
                    <img src="images.jpeg" style="width:45px; height:45px; border-radius:50%; background:white; margin-right:12px;">
                    <div style="font-size:14px; color:var(--epu-gold); font-weight:bold;">Ethiopian Police University</div>
                </div>
                <div class="card-body">
                    <img src="images.jpeg" class="watermark-layer">
                    <img src="${s.photo_url}" class="main-photo" crossorigin="anonymous">
                    <img src="${s.photo_url}" class="ghost-photo" crossorigin="anonymous">
                    <div class="details">
                        <div class="student-name">${s.name}</div>
                        <div style="background:var(--epu-blue); color:var(--epu-gold); padding:3px 8px; border-radius:4px; font-size:10px; font-weight:bold; display:inline-block; margin:5px 0;">TVET STUDENT</div><br>
                        <div class="id-department">
                            ID: EPU-TVET-${sid} <br>
                            Dept: ${department}
                        </div>
                    </div>
                </div>
                <div class="footer">"Protect With Courage; Serve With Compassion!"</div>
            </div>`;
    });
}

async function generatePDF(type) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    
    let allCards = Array.from(document.querySelectorAll('.id-card'));
    let cardsToPrint = [];
    
    if (type === 'custom') {
        const selectedList = document.getElementById('customIDs').value.split(',').map(id => id.trim());
        const uniqueList = [...new Set(selectedList)];
        cardsToPrint = allCards.filter(c => uniqueList.includes(c.getAttribute('data-sid')));
    } else {
        cardsToPrint = allCards;
    }

    if (cardsToPrint.length === 0) return alert("No students found!");

    for (let i = 0; i < cardsToPrint.length; i++) {
        const canvas = await html2canvas(cardsToPrint[i], { scale: 3, useCORS: true });
        const imgData = canvas.toDataURL('image/png');
        
        const col = i % 2;
        const row = Math.floor(i / 2) % 2;
        
        if (i > 0 && i % 4 === 0) pdf.addPage();
        
        const xPos = 5 + (col * 102);
        const yPos = 10 + (row * 72);
        
        pdf.addImage(imgData, 'PNG', xPos, yPos, 100, 70);
    }
    pdf.save("EPU_Paper_IDs_4perPage.pdf");
}
</script>
</body>
</html>
